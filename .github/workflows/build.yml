name: CI - Build & Test Media Player

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    name: Build & Test Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          modules: 'qtmultimedia'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: |
          cd build
          ./tst_player -v2

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-linux
          path: build/

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          modules: 'qtmultimedia'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: |
          $exe = Get-ChildItem -Path build -Recurse -Filter "tst_player.exe" | Select-Object -First 1
          if ($exe) {
            Write-Host "Found: $($exe.FullName)"
            & $exe.FullName -v2
          } else {
            Write-Host "tst_player.exe not found, listing build dir:"
            Get-ChildItem -Path build -Recurse -Filter "*.exe"
          }
        shell: pwsh

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: mediaplayer-windows
          path: build/Release/*.exe